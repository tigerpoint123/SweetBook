spring:
  application:
    name: backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB
  datasource:
    url: jdbc:h2:file:./data/testdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update   
    show-sql: true
    properties:
      hibernate:
        format_sql: true

sweetbook:
  api:
    base-url: ${SWEETBOOK_API_BASE_URL}
    key: ${SWEETBOOK_API_KEY}
  contents:
    template-uid: ${SWEETBOOK_CONTENTS_TEMPLATE_UID}
    break-before: ${SWEETBOOK_CONTENTS_BREAK_BEFORE}

# 업로드 이미지 로컬 저장 (프로젝트 기준 상대 경로)
app:
  photo:
    upload-dir: uploads/photos

