spring:
#  config:
#    import: "optional:configtree:.env/"
  application:
    name: backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB
  datasource:
    url: jdbc:h2:file:./data/testdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update   
    show-sql: true
    properties:
      hibernate:
        format_sql: true

sweetbook:
  api:
    base-url: ${SWEETBOOK_API_BASE_URL:https://api-sandbox.sweetbook.com/v1}
    key: ${SWEETBOOK_API_KEY}
  # POST .../contents 는 multipart/form-data. parameters JSON 에 monthYearLabel·photos(배열) 등 템플릿 필수 항목 포함.
  contents:
    template-uid: ${SWEETBOOK_CONTENTS_TEMPLATE_UID:1vuzMfUnCkXS}
    break-before: ${SWEETBOOK_CONTENTS_BREAK_BEFORE:page}

# 업로드 이미지 로컬 저장 (프로젝트 기준 상대 경로)
app:
  photo:
    upload-dir: uploads/photos